name: Build and Release Electron App

# This workflow triggers ONLY when you push a new version tag (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Sync version from git tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version
        shell: bash

      # --- Conditional Build Logic ---
      
      - name: Build and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make -- --arch x64

      - name: Build and Package (macOS)
        if: matrix.os == 'macos-latest'
        # This explicitly builds for both Intel and Apple Silicon Macs
        run: |
          npm run make -- --arch x64
          npm run make -- --arch arm64

      - name: Upload Artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # This grabs the compiled .exe, .dmg, .zip, and Windows .nupkg files
          files: |
            out/**/*.exe
            out/**/*.dmg
            out/**/*.zip
            out/**/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}